<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Add Home</title>
    <style>
      *,
      *::before,
      *::after {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      body {
        min-height: 100vh;
        display: grid;
        place-items: center;
        background: linear-gradient(180deg, #eef2f6 0%, #ffffff 100%);
        font-family:
          system-ui,
          -apple-system,
          BlinkMacSystemFont,
          "Segoe UI",
          sans-serif;
        color: #20232a;
      }

      .page {
        width: min(100%, 520px);
        padding: 2rem;
      }

      .card {
        padding: 2rem;
        border-radius: 24px;
        background: #ffffff;
        box-shadow: 0 24px 60px rgba(18, 31, 54, 0.08);
        border: 1px solid rgba(17, 24, 39, 0.06);
      }

      .badge {
        display: inline-flex;
        margin-bottom: 1rem;
        padding: 0.5rem 0.9rem;
        background: #f3f6fb;
        color: #2563eb;
        font-size: 0.8rem;
        font-weight: 700;
        border-radius: 999px;
      }

      h1 {
        font-size: clamp(1.8rem, 2.5vw, 2.4rem);
        margin-bottom: 0.75rem;
        line-height: 1.05;
      }

      p {
        margin-bottom: 1.75rem;
        color: #515962;
        line-height: 1.7;
      }

      form {
        display: grid;
        gap: 1rem;
      }

      label {
        font-size: 0.95rem;
        color: #343d4d;
        display: block;
        margin-bottom: 0.35rem;
      }

      input[type="text"],
      input[type="number"] {
        width: 100%;
        padding: 0.95rem 1rem;
        border: 1px solid #d3d8e0;
        border-radius: 16px;
        background: #f9fbff;
        color: #1f2937;
        font-size: 1rem;
      }

      input[type="text"]:focus,
      input[type="number"]:focus {
        outline: none;
        border-color: #5b86e5;
        box-shadow: 0 0 0 4px rgba(91, 134, 229, 0.12);
      }

      .actions {
        display: flex;
        flex-wrap: wrap;
        gap: 0.75rem;
        margin-top: 1rem;
      }

      .btn,
      .link {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        min-height: 48px;
        padding: 0 1.4rem;
        border-radius: 999px;
        text-decoration: none;
        font-weight: 600;
      }

      .btn {
        color: #ffffff;
        background: #111827;
        border: none;
        cursor: pointer;
        transition:
          transform 0.2s ease,
          background 0.2s ease;
      }

      .btn:hover {
        transform: translateY(-1px);
        background: #1f2937;
      }

      .link {
        color: #111827;
        background: #f3f4f6;
      }

      .link:hover {
        background: #e5e7eb;
      }

      .note {
        margin-top: 1.5rem;
        color: #64748b;
        font-size: 0.95rem;
      }
    </style>
  </head>
  <body>
    <section class="page">
      <article class="card">
        <span class="badge">New Listing</span>
        <h1>Add a new home</h1>
        <p>
          Enter the details of the home and submit to add it to the listings.
          Keep this form simple so adding a property feels fast and clear.
        </p>

        <form action="/add-home" method="post">
          <div>
            <label for="name">House Name</label>
            <input
              type="text"
              name="name"
              placeholder="Enter house name"
              id="name"
              required
            />
          </div>

          <div>
            <label for="location">Location</label>
            <input
              type="text"
              name="location"
              placeholder="Enter house location"
              id="location"
              required
            />
          </div>

          <div>
            <label for="price">Price</label>
            <input
              type="number"
              name="price"
              placeholder="Enter house price"
              id="price"
              required
            />
          </div>

          <div>
            <label for="rating">Rating</label>
            <input
              type="number"
              name="rating"
              placeholder="Rate 1–5"
              id="rating"
              min="1"
              max="5"
              required
            />
          </div>

          <div class="actions">
            <button type="submit" class="btn">Add home</button>
            <a href="/" class="link">Back to home</a>
          </div>
        </form>

        <p class="note">
          Tip: Use a clear house title and location to keep listings easy to
          browse.
        </p>
      </article>
    </section>
  </body>
</html>
