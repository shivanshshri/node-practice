<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Home Added</title>
    <style>
      *,
      *::before,
      *::after {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      body {
        min-height: 100vh;
        display: grid;
        place-items: center;
        background: linear-gradient(180deg, #f5f7fb 0%, #ffffff 100%);
        font-family:
          system-ui,
          -apple-system,
          BlinkMacSystemFont,
          "Segoe UI",
          sans-serif;
        color: #1f2937;
      }

      .panel {
        width: min(92vw, 520px);
        padding: 2.25rem;
        border-radius: 28px;
        background: #ffffff;
        border: 1px solid rgba(15, 23, 42, 0.08);
        box-shadow: 0 24px 60px rgba(15, 23, 42, 0.08);
        text-align: center;
      }

      .icon {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        width: 72px;
        height: 72px;
        margin-bottom: 1.5rem;
        border-radius: 50%;
        background: #dbeafe;
        color: #2563eb;
        font-size: 2rem;
      }

      h1 {
        font-size: clamp(1.9rem, 3vw, 2.6rem);
        margin-bottom: 1rem;
      }

      p {
        margin-bottom: 1.75rem;
        color: #4b5563;
        font-size: 1rem;
        line-height: 1.75;
      }

      .actions {
        display: flex;
        flex-direction: column;
        gap: 0.9rem;
      }

      .btn,
      .btn-secondary {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        min-height: 52px;
        border-radius: 999px;
        padding: 0 1.4rem;
        font-weight: 700;
        text-decoration: none;
      }

      .btn {
        background: #111827;
        color: #ffffff;
      }

      .btn:hover {
        background: #1f2937;
      }

      .btn-secondary {
        background: #f8fafc;
        color: #111827;
        border: 1px solid #e2e8f0;
      }

      .btn-secondary:hover {
        background: #eff2f7;
      }
    </style>
  </head>
  <body>
    <section class="panel">
      <div class="icon">✓</div>
      <h1>Home added successfully</h1>
      <p>
        Your new listing is now recorded and ready to appear in the home
        collection. You can return to the homepage or add another listing next.
      </p>
      <div class="actions">
        <a href="/" class="btn">Go to homepage</a>
        <a href="/add-home" class="btn-secondary">Add another home</a>
      </div>
    </section>
  </body>
</html>
